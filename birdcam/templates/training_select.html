<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Image - {{ bird }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 12px;
            -webkit-tap-highlight-color: transparent;
        }
        h2 { font-size: 1.2em; margin-bottom: 12px; }
        .back-link {
            display: inline-block;
            color: #4ecca3;
            text-decoration: none;
            margin-bottom: 12px;
            font-size: 0.95em;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .thumb {
            width: calc(50% - 4px);
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: border-color 0.15s;
        }
        .thumb:active { border-color: #4ecca3; }
        .thumb img {
            width: 100%;
            height: auto;
            display: block;
        }
        .thumb-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            padding: 4px 6px;
            font-size: 0.7em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .empty { color: #888; padding: 20px 0; text-align: center; }
        @media (min-width: 600px) {
            .thumb { width: calc(33.33% - 6px); }
        }
    </style>
</head>
<body>
    <a href="/training" class="back-link">&larr; Back to Training</a>
    <h2>{{ bird }} &mdash; Tap image to label</h2>

    {% if images %}
    <div class="gallery">
        {% for image in images %}
        <a href="/training/label/{{ image }}" class="thumb">
            <img src="/images/{{ image }}" alt="{{ image }}" loading="lazy">
            <span class="thumb-label">{{ image }}</span>
        </a>
        {% endfor %}
    </div>
    {% else %}
    <p class="empty">No images found for {{ bird }}.</p>
    {% endif %}
</body>
</html>
