<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bird Detections</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>
<body>
    <h2>Bird Detection Summary</h2>
    <div class="btn-row">
        <a href="/training" class="neon-btn neon-btn-accent">Training Labels</a>
        <button class="neon-btn neon-btn-danger" onclick="shutdown()">Shutdown</button>
        <button class="neon-btn" id="huePauseBtn" onclick="toggleHuePause()">Pause Hue Lights</button>
    </div>
    <script>
        function shutdown() {
            if (confirm("Are you sure you want to shut down the Raspberry Pi?")) {
            fetch('/shutdown', { method: 'POST' })
                .then(response => {
                if (response.ok) {
                    alert("Shutting down...");
                } else {
                    alert("Failed to shut down.");
                }
                });
            }
        }
        function toggleHuePause() {
            const btn = document.getElementById('huePauseBtn');
            const paused = btn.textContent.includes('Resume') ? false : true;
            fetch('/api/hue_pause', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paused: paused })
            }).then(response => {
                if (response.ok) {
                    updateHuePauseButton();
                }
            });
        }
        function updateHuePauseButton() {
            fetch('/api/hue_pause')
                .then(response => response.json())
                .then(data => {
                    const btn = document.getElementById('huePauseBtn');
                    btn.textContent = data.paused ? 'Resume Hue Lights' : 'Pause Hue Lights';
                });
        }
        window.onload = updateHuePauseButton;
    </script>
    <table class="neon-table">
        <tr>
            <th>Bird Species</th>
            <th>Total Detections</th>
            <th>Images</th>
        </tr>
        {% for bird, count in bird_counts.items() %}
        <tr>
            <td>
                <i class="bird-sprite sprite-unknown sprite-{{ bird|lower|replace(' ', '-') }}"></i>
                {{ bird }}
            </td>
            <td>{{ count }}</td>
            <td>
                <a href="/bird/{{ bird }}" target="_blank">View Images</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
