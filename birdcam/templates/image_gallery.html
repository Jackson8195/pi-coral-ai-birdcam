<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bird Image Gallery</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>
<body>
    <a href="/" class="neon-link">&larr; Back to Detections</a>
    <h2>
        <i class="bird-sprite sprite-unknown sprite-{{ bird|lower|replace(' ', '-') }}"></i>
        {{ bird }}
    </h2>

    <div class="gallery">
        {% for image in images %}
        <div class="image-item">
            <a href="/images/{{ image }}" target="_blank">
                <img src="/images/{{ image }}" alt="{{ image }}">
            </a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
